dir_pin: PA4
enable_pin: !PC3
microsteps: 16
full_steps_per_rotation:200
rotation_distance:32
position_endstop:278.5
position_min: -19.5
position_max: 278.5
homing_speed: 30
homing_retract_dist:0
second_homing_speed:30
endstop_pin: tmc2209_stepper_x:virtual_endstop

[stepper_y]
step_pin: PC4
dir_pin: !PA7
enable_pin: !PC3
microsteps: 16
full_steps_per_rotation:200
rotation_distance:32
position_endstop: -6
position_min: -6
position_max: 277
homing_speed: 20
homing_retract_dist:0
second_homing_speed:20
endstop_pin: tmc2209_stepper_y:virtual_endstop

[stepper_z]
step_pin: PC9
dir_pin: PB1
enable_pin: !PC3
microsteps: 16
rotation_distance:8
full_steps_per_rotation:200
endstop_pin: probe:z_virtual_endstop #PB15
#position_endstop: 0
position_min:-4
position_max: 262
homing_speed: 6
homing_retract_dist:4
second_homing_speed:3

[extruder]
max_extrude_only_distance : 1200.0
step_pin: nozzle_mcu:PC14
dir_pin: nozzle_mcu:PC15
enable_pin: !nozzle_mcu:PC13
microsteps: 16
full_steps_per_rotation:200
rotation_distance:6.426
nozzle_diameter: 0.400
filament_diameter: 1.750
max_extrude_cross_section:50
heater_pin: nozzle_mcu:PB8
sensor_type: NTC 100K MGB18-104F39050L32
sensor_pin: nozzle_mcu:PA0
#control: pid
#pid_Kp: 19.026
#pid_Ki: 0.893
#pid_Kd: 101.311
min_temp: -200
min_extrude_temp: 170
max_temp: 320
pressure_advance: 0.02

[heater_bed]
heater_pin: PA0
sensor_type: NTC 100K beta 3950
sensor_pin: PC0
#control: pid
#pid_Kp: 63.575
#pid_Ki: 1.054
#pid_Kd: 958.388
min_temp: -200
max_temp: 120

[tmc2209 stepper_x]
uart_pin: PA3
uart_address: 3
run_current: 1.5
hold_current:1.1
sense_resistor: 0.0750
stealthchop_threshold:0
interpolate: True
driver_SGTHRS:72
diag_pin: PA6

[tmc2209 stepper_y]
uart_pin: PA3
uart_address: 1
run_current: 1.7
hold_current:0.8
sense_resistor: 0.075
stealthchop_threshold:0
interpolate: True
driver_SGTHRS:45
diag_pin: PC5

[tmc2209 stepper_z]
