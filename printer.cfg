uart_address: 2
run_current: 1.4
hold_current:0.7
sense_resistor: 0.0750
stealthchop_threshold: 99999
interpolate: True
driver_MULTISTEP_FILT:False

[tmc2209 extruder]
uart_pin: nozzle_mcu:PA3
uart_address: 3
run_current: 0.8
hold_current:0.4
sense_resistor: 0.0750
stealthchop_threshold: 99999
interpolate: True

[probe_ks1]
pin:PB15
x_offset:0
y_offset:0
#z_offset: -0.100
speed: 6.0
lift_speed: 6.0
samples: 2
sample_retract_dist: 2
samples_result: average
samples_tolerance: 0.1
samples_tolerance_retries:10

[bed_mesh]
speed: 120
fade_start: 1
fade_end: 10
fade_target: 0
horizontal_move_z:4
mesh_min: 15,15
mesh_max: 240,235
probe_count: 6,6
mesh_pps: 2,2
