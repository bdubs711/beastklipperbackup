[shaketune]
# result_folder: ~/printer_data/config/ShakeTune_results
#    Path where the processed results will be stored. If the folder doesn't exist,
#    it will be automatically created. You can change this if you'd like to store 
#    results in a different location.
# number_of_results_to_keep: 10
#    This setting defines how many results you want to keep in the result folder.
#    Once the specified number is exceeded, older results will be automatically deleted
#    to free up space on the SD card and avoid cluttering the results folder.
# keep_raw_data: False
#    If set to True, Shake&Tune will store both the processed graphs and the raw accelerometer
#    .stdata files in the results folder. This can be useful for debugging or archiving purposes.
#    Please always attach them when reporting any issues on GitHub or Discord.
# show_macros_in_webui: True
#    Mainsail and Fluidd doesn't create buttons for system commands (macros that are not part
#    of the printer.cfg file). This option allow Shake&Tune to inject them into the webui at runtime.
#    If set to False, the macros will be hidden but still accessible from the console by typing
#    their names manually, which can be useful if you prefer to encapsulate them into your own macros.
# timeout: 600
#    This defines the maximum processing time (in seconds) to allows to Shake&Tune for generating 
#    graphs from a .stdata file. 10 minutes should be more than enough in most cases, but if you have
#    slower hardware (e.g., older SD cards or low-performance devices), increase it to prevent timeouts.
# measurements_chunk_size: 2
#    Each Shake&Tune command uses the accelerometer to take multiple measurements. By default,
#    Shake&Tune will write a chunk of data to disk every two measurements, and at the end of the
#    command will merge these chunks into the final .stdata file for processing. "2" is a very
#    conservative setting to avoid Klipper Timer Too Close errors on lower end devices with little
#    RAM, and should work for everyone. However, if you are using a powerful computer, you may
#    wish to increase this value to keep more measurements in memory (e.g., 15-20) before writing
#    the chunk and avoid stressing the filesystem too much.
# max_freq: 200
#    This setting defines the maximum frequency at which the calculation of the power spectral density
#    is cutoff. The default value should be fine for most machines and accelerometer combinations and
#    avoid touching it unless you know what you're doing.
# dpi: 300
#    Controls the resolution of the generated graphs. The default value of 300 dpi was optimized
#    and strikes a balance between performance and readability, ensuring that graphs are clear
#    without using too much RAM to generate them. Usually, you shouldn't need to change this value.

[gcode_macro SHAKE_NOZZLE_HORIZONTAL]
description: "Shake nozzle left/right to remove purged filament"
# Optional parameters:
#   AMP: amplitude of shake in mm
#   COUNT: number of shake cycles
#   SPEED: feedrate for shaking in mm/min
gcode:
    {% set AMP = params.AMP|default(40)|float %}
    {% set COUNT = params.COUNT|default(3)|int %}
    {% set SPEED = params.SPEED|default(12000)|float %}
    {% set AMP_NEG = 0 - AMP %}

    SAVE_GCODE_STATE NAME=shake_nozzle_state

    G91
    VEL_PUSH
    SET_VELOCITY_LIMIT ACCEL=15000 ACCEL_TO_DECEL=5000 VELOCITY=300
    {% for i in range(COUNT) %}
        G1 X{AMP} F{SPEED}
        G1 X{AMP_NEG} F{SPEED}
    {% endfor %}

    G90
    VEL_POP
    RESTORE_GCODE_STATE NAME=shake_nozzle_state
    
[gcode_macro NOZZLE_WIPE_SEQUENCE]
gcode:
    SAVE_GCODE_STATE NAME=wipe_nozzle_state
    VEL_PUSH
    SET_VELOCITY_LIMIT ACCEL=15000 ACCEL_TO_DECEL=5000 VELOCITY=300
    G90
    G1 X46 Y260 Z3 F9600
    G1 X46 Y260 Z-0.8 F9600
    G1 X50 Y260 Z1 F9600
    G1 X86 Y260 Z1 F9600
    G1 X90 Y260 Z-0.8 F9600
    G1 X90 Y259 Z-0.8 F9600
    G1 X86 Y259 Z1 F9600
    G1 X50 Y259 Z1 F9600
    G1 X46 Y259 Z-0.8 F9600
    M400
    G1 X70 Y260 Z0.2 F9600
    SHAKE_NOZZLE_HORIZONTAL
    G1 X70 Y260 Z3 F9600
    M400
    VEL_POP
    G90
    G1 Z4 F600
    M400
    
    RESTORE_GCODE_STATE NAME=wipe_nozzle_state MOVE=1 MOVE_SPEED=200

[gcode_macro RESUME_NOZZLE_WIPE_SEQUENCE]
gcode:
    TO_THROW_POSITION SPEED=2000
    TO_THROW_POSITION

[gcode_macro MOVE_FLUSH_POS]
gcode:
    G90
    G1 X278 F9600


[gcode_macro TO_THROW_POSITION]
gcode:
    {% set speed = params.SPEED|default(12000)|float %}
    G90
    G1 X250 F{speed}
    MOVE_FLUSH_POS


[gcode_macro CUT_TIP]
gcode:
    {% set min_temp = printer.configfile.settings.extruder.min_extrude_temp|int %}
    {% set current_temp = printer.extruder.temperature|float %}

    { action_respond_info("ACE[M]: Cut pre...") }
  
    # Check if we need to heat
    {% if current_temp > min_temp %}
      G1 E-2 F300 # Avoid oozing if nozzle is already hot    
    {% endif %}
  
    
    { action_respond_info("ACE[M]: Cutting...") }
    G91
    G1 Z4 F4800
    G90
    G1 Y260 F9600
    G91
    G1 Z-4 F4800
    G90
    G1 X0 F12000
    M400
    G1 X-16 F600
    M400
    FORCE_MOVE STEPPER=extruder DISTANCE=-2 VELOCITY=10
    FORCE_MOVE STEPPER=extruder DISTANCE=2 VELOCITY=10
    FORCE_MOVE STEPPER=extruder DISTANCE=-2 VELOCITY=10 
    G1 X0 F6000
    MOVE_FLUSH_POS
    M400
    FORCE_MOVE STEPPER=extruder DISTANCE=2 VELOCITY=10
    M400
    
    { action_respond_info("ACE[M]: Cut done...") }

[gcode_macro MOVE_HEAT_POS]
gcode:
    G90
    G1 X278 F9600
   

[gcode_macro UNDERLINE]
gcode:
    G90
    G92 E0
    G1 E-1 F300
    G1 Y4 F2400
    G1 X10 F9600
    G1 Z0.28
    G1 E1 F300
    G1 X180 E40 F500
    M400
    G92 E0
    G1 E-0.5 F300
    G1 Z2
    M400

[gcode_macro MOVE_END_POS]
gcode:
    G90
    G1 X5 Y242.25 F9600
    M400

[display_status]


[gcode_macro nozzle_light_on]
  gcode:
      SET_PIN PIN=nozzle_light VALUE=1

[gcode_macro nozzle_light_off]
  gcode:
      SET_PIN PIN=nozzle_light VALUE=0

[gcode_macro logo_light_on]
  gcode:
      SET_PIN PIN=logo_light VALUE=1

[gcode_macro logo_light_off]
  gcode:
      SET_PIN PIN=logo_light VALUE=0


[gcode_macro lights_off]
gcode:
    logo_light_off
    nozzle_light_off
    
[gcode_macro nozzle_light_toggle]
gcode:
    {% if printer["output_pin nozzle_light"].value == 0 %}
        nozzle_light_on
    {% else %}
        nozzle_light_off
    {% endif %}

[gcode_macro logo_light_toggle]
gcode:
    {% if printer["output_pin logo_light"].value == 0 %}
        logo_light_on
    {% else %}
        logo_light_off
    {% endif %}


[gcode_macro CANCEL_PRINT]
description: CANCEL_PRINT
rename_existing: CANCEL_PRINT_BASE
gcode:
    #In case resume was called from CANCEL PROMPT, close the prompt
    RESPOND TYPE=command MSG=action:prompt_end

    {action_respond_info("ACE[M]: CANCEL_PRINT, lifting Z")}
    G91
    G1 Z3 F600
    G90

    {% if printer["output_pin ACE_Pro"] is defined and printer["output_pin ACE_Pro"].value %}
        _ACE_HANDLE_PRINT_END
    {% else %}
        {action_respond_info("ACE[M]: ACE Pro disabled. Normal cut sequence")}
        CUT_TIP
        FORCE_MOVE STEPPER=extruder DISTANCE=-50 VELOCITY=8
    {% endif %}
    MOVE_FLUSH_POS

    M104 S0
    M140 S0 ; turn off heatbed
    M106 S0 ; fan off
    M84 # Disable steppers
    lights_off

    CANCEL_PRINT_BASE

[gcode_macro PRINT_END]
description: PRINT_END
gcode:
    {% set _cut_raw = (params.CUT_TIP | default(params.cut_tip) | default("1")) | string %}
    {% set _cut_raw = (_cut_raw | trim | replace('=', '', 1) | lower) %}
    {% set do_cut = (1 if _cut_raw in ['1','true','yes','on'] else 0) %}
    {action_respond_info("PRINT_END, lifting z")}
    G91
    G1 Z3 F600
    G90
        {% if printer["output_pin ACE_Pro"] is defined and printer["output_pin ACE_Pro"].value %}
            _ACE_HANDLE_PRINT_END CUT_TIP={do_cut}
        {% endif %}
    
    # Note: CUT_TIP and filament retraction is handled by _ACE_HANDLE_PRINT_END
    # Only do manual cut/retract if ACE is disabled
    {% if not (printer["output_pin ACE_Pro"] is defined and printer["output_pin ACE_Pro"].value) %}
        {% if do_cut %}
            {action_respond_info("Cutting filament")}
            CUT_TIP
            TO_THROW_POSITION
            {action_respond_info("Retracting filament")}
            FORCE_MOVE STEPPER=extruder DISTANCE=-50 VELOCITY=8
        {% else %}
            {action_respond_info("Skipping CUT_TIP")}
            TO_THROW_POSITION
        {% endif %}
    {% else %}
        # ACE handled the cut/retract, just move to throw position
        TO_THROW_POSITION
    {% endif %}

    M104 S0
    M140 S0 ; turn off heatbed
    M106 S0 ; fan off
    M84 # Disable steppers
    lights_off

# =======================
# G9111 — Startup Macro for Anycubic slicer compatibility
# =======================
[gcode_macro G9111]
description: "Startup: G9111 BEDTEMP=<°C> EXTRUDERTEMP=<°C> [WIPETEMP=<°C>] [TOOL=inital tool index] [SKIP_PURGE_FOR_ALREADY_LOADED_TOOL=0|1]"
variable_travel_speed: 200  # mm/s
variable_wipe_temp: 170
gcode:
  # Helper: strip one leading '=' if present, then float
  {% set bed_raw = (params.BEDTEMP | default(params.S) | default("60")) | string %}
  {% set noz_raw = (params.EXTRUDERTEMP | default(params.T) | default("200")) | string %}
  {% set wipe_raw = (params.WIPETEMP | default(printer["gcode_macro G9111"].wipe_temp) | string) %}
  {% set TOOL = ((params.TOOL | default(params.tool) | default(params.T) | default(params.t) | default("-1")) | string | replace('=', '', 1) | int) %}
  {% set _skip_raw =
      (params.SKIP_PURGE_FOR_ALREADY_LOADED_TOOL
       | default(params.skip_purge_for_already_loaded_tool)
       | default("0")) | string
  %}
  {% set _skip_raw = (_skip_raw | trim | replace('=', '', 1) | lower) %}
  {% set SKIP_PURGE_FOR_ALREADY_LOADED_TOOL = (1 if _skip_raw in ['1','true','yes','on'] else 0) %}

  {% set BEDTEMP = (bed_raw | replace('=', '', 1)) | float %}
  {% set EXTRUDERTEMP = (noz_raw | replace('=', '', 1)) | float %}
  {% set WIPETEMP = (wipe_raw | replace('=', '', 1)) | float %}

  {% set f_travel = (printer["gcode_macro G9111"].travel_speed | float) * 60 %}

  { action_respond_info(
      "G9111: bed=%.1f°C, wipe=%.1f°C, final nozzle=%.1f°C, travel_speed=%.1f tool=%d"
      % (BEDTEMP, WIPETEMP, EXTRUDERTEMP, f_travel, TOOL)
    ) }


  # --- Set startup_toolchange flag ---
  {% if printer["gcode_macro _ACE_STATE"] is defined %}
    SET_GCODE_VARIABLE MACRO=_ACE_STATE VARIABLE=startup_toolchange VALUE=1
  {% endif %}

  {% set local_skip_purge = False %}

  {% if SKIP_PURGE_FOR_ALREADY_LOADED_TOOL %}
    # --- SMART LOGIC START ---

    # Safety check: Does save_variables exist? (Important for non-ACE users)
    {% if printer.save_variables is defined and printer.save_variables.variables is defined %}
        {% set ace_index = printer.save_variables.variables.ace_current_index|default(-1)|int %}
        {% set filament_pos = printer.save_variables.variables.ace_filament_pos|default('none') %}
    {% else %}
        # Fallback if save_variables is missing -> Force Purge
        {% set ace_index = -1 %}
        {% set filament_pos = 'none' %}
    {% endif %}

    # What does the sensor actually see?
    {% set is_physically_loaded = False %}
    {% if "filament_switch_sensor filament_runout_nozzle" in printer.configfile.settings %}
            {% set is_physically_loaded = printer["filament_switch_sensor filament_runout_nozzle"].filament_detected %}
    {% endif %}

    {% if TOOL == ace_index and filament_pos == 'nozzle' and is_physically_loaded %}
        {% set local_skip_purge = True %}
        { action_respond_info("G9111: Tool %d correctly loaded (Memory+Sensor). Purge SKIPPED." % TOOL) }
    {% else %}
        {% if not is_physically_loaded and TOOL == ace_index %}
                { action_respond_info("G9111: Same Tool (%d), but sensor reports EMPTY. Purge ACTIVE." % TOOL) }
        {% else %}
                { action_respond_info("G9111: Tool change (%d -> %d). Purge ACTIVE." % (ace_index, TOOL)) }
        {% endif %}
    {% endif %}
    # --- SMART LOGIC END ---
  {% else %}
    { action_respond_info("G9111: Smart logic disabled - Purge will always run") }
  {% endif %}

  logo_light_on
  # Set temps
  RESPOND TYPE=echo MSG="Nowait pre-heat for nozzle wipe"
  M104 S{WIPETEMP}
  M140 S{BEDTEMP}

  RESPOND TYPE=echo MSG="Home"
  G28

  RESPOND TYPE=echo MSG="Wait for pre-heat temp reached"
  MOVE_HEAT_POS
  # Wait to wipe temp
  M109 S{WIPETEMP}
  RESPOND TYPE=echo MSG="Wipe nozzle"
  NOZZLE_WIPE_SEQUENCE

  RESPOND TYPE=echo MSG="Homing"
  G90
  G28 Z
  M106 S255
    
  #BED_MESH_PROFILE LOAD=default
  RESPOND TYPE=echo MSG="Meshing Bro"
  BED_MESH_CALIBRATE PROFILE=adaptive ADAPTIVE=1

  # Final nozzle temp (wait)
  nozzle_light_on
  RESPOND TYPE=echo MSG="Heat nozzle to print temperature"
  M106 S0
  MOVE_HEAT_POS
  M109 S{EXTRUDERTEMP}

  #Inform ace that this is initial startup toolchange. This avoids double wipping from this macro and the toolchange macro
  {% if printer["gcode_macro _ACE_STATE"] is defined
   and printer["gcode_macro _ACE_STATE"].startup_toolchange is defined %}
    SET_GCODE_VARIABLE MACRO=_ACE_STATE VARIABLE=startup_toolchange VALUE=1
  {% endif %}
  
  ; if a tool index was passed, activate it
  {% if TOOL >= 0 %}
      RESPOND TYPE=echo MSG="Selecting passed active tool"
      T{TOOL}
      M400      
  {% else %}
    # Assure tool active / filament loaded from ACE slot
    {% set current_extruder = printer.toolhead.extruder %}
    {% set suffix = current_extruder | replace('extruder','') %}
    {% set tool_num = suffix if suffix|length > 0 else '0' %}
    RESPOND TYPE=echo MSG="Re-selecting active tool"
    T{tool_num}
    M400    
  {% endif %}
  
  {% if not local_skip_purge %}
    RESPOND TYPE=echo MSG="Prime nozzle"
    G92 E0
    G1 E80 F300
    G1 E80 F150
  {% else %}
    RESPOND TYPE=echo MSG="ACE: Purge skipped"
  {% endif %}

  RESPOND TYPE=echo MSG="Wipe nozzle after purge"
  NOZZLE_WIPE_SEQUENCE
  
  G92 E0
  G1 E-1 F7000
  G92 E0
  
  RESPOND TYPE=echo MSG="Purge line"
  UNDERLINE

  # --- Clear startup_toolchange flag ---
  {% if printer["gcode_macro _ACE_STATE"] is defined %}
    SET_GCODE_VARIABLE MACRO=_ACE_STATE VARIABLE=startup_toolchange VALUE=0
  {% endif %}

  RESPOND TYPE=echo MSG="G9111 complete."

[gcode_macro FLUSH_POOP]
description: Flush
gcode:
  M106 S255  
  G4 P1000
  G90
  G1 X250 F9600
  G4 P1000  
  TO_THROW_POSITION  SPEED=2000
  M106 S0
  
[gcode_macro SET_ACTIVE_SPOOL]
gcode:
    {% set ID = params.ID|int %}
    {action_call_remote_method("spoolman_set_active_spool", spool_id=ID)}

[gcode_macro CLEAR_ACTIVE_SPOOL]
gcode:
  {action_call_remote_method(
    "spoolman_set_active_spool",
    spool_id=None
  )}

[gcode_macro _TOOL_MAP]
variable_t0: 0
variable_t1: 1
variable_t2: 2
variable_t3: 3
variable_t4: 0
variable_t5: 1
variable_t6: 2
variable_t7: 3
variable_t8: 0
variable_t9: 1
variable_t10: 2
variable_t11: 3
variable_t12: 0
variable_t13: 1
variable_t14: 2
variable_t15: 3
gcode:

[gcode_macro SET_TOOL_MAP]
gcode:
    {% set map = params.MAP.split(',') %}
    {% for i in range(map|length) %}
        SET_GCODE_VARIABLE MACRO=_TOOL_MAP VARIABLE=t{i} VALUE={map[i]|int}
    {% endfor %}
    RESPOND MSG="Tool mapping set for {map|length} slicer slots"

[gcode_macro SHOW_TOOL_MAP]
gcode:
    {% set tm = printer["gcode_macro _TOOL_MAP"] %}
    RESPOND MSG="=== Current Tool Mapping ==="
    {% for i in range(16) %}
        RESPOND MSG="Slicer T{i} → Physical Gate {tm['t' ~ i]}"
    {% endfor %}
    RESPOND MSG="=============================="

[gcode_macro ENABLE_AI_MONITOR]
gcode:
    RUN_SHELL_COMMAND CMD=ai_monitor_enable
    M118 AI Failure Detection Started

[gcode_macro DISABLE_AI_MONITOR]
gcode:
    RUN_SHELL_COMMAND CMD=ai_monitor_disable
    M118 AI Failure Detection Stopped

[gcode_shell_command ai_monitor_enable]
command: curl -X POST http://127.0.0.1:7126/api/action/start_from_macro
timeout: 5

[gcode_shell_command ai_monitor_disable]
command: curl -X POST http://127.0.0.1:7126/api/action/stop
timeout: 5

[gcode_macro MR_NOTIFY]
description: Allows you to send a custom notification via Mobileraker without using the M117 command
gcode:
    {% set msg = "MR_NOTIFY:" ~ (params.TITLE ~ "|" if 'TITLE' in params|upper else "") ~ params.MESSAGE %}

    {% if 'MESSAGE' in params|upper %}
        { action_respond_info(msg) }
    {% else %}
        { action_raise_error('Must provide MESSAGE parameter') }
    {% endif %}

